services:
  # Portfolio - Web Service (existing)
  - type: web
    name: slav
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    region: frankfurt
    autoDeploy: true
    branch: develop
    pullRequestPreviewsEnabled: false
    healthCheckPath: /

  # Obilaznica - Static Site
  - type: static
    name: obilaznica
    plan: free
    region: frankfurt
    autoDeploy: true
    branch: develop
    buildCommand: cd obilaznica/app && npm install -g pnpm && pnpm install && pnpm build
    staticPublishPath: obilaznica/app/dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable